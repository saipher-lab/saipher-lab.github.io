<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saipher | Home Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      text-align: center;
      z-index: 1;
    }

    h1 {
      font-size: 3rem;
      text-shadow: 0 0 20px #8A2BE2FF; /* ROXO */
    }

    /* Nome clicável com efeito roxo */
    .name-link {
      display: block;
      margin-top: 10px;
      font-size: 1.2rem;
      color: white;
      text-decoration: none;
      transition: 0.3s;
      cursor: pointer;
    }

    .name-link:hover {
      color: #522081;
      text-shadow: 0 0 10px #8A2BE2FF;
      animation: pulse-name 2s infinite;
    }

    @keyframes pulse-name {
      0% { text-shadow: 0 0 5px #8A2BE2FF; }
      50% { text-shadow: 0 0 20px #8A2BE2FF; }
      100% { text-shadow: 0 0 5px #8A2BE2FF; }
    }

    .subtitle {
      opacity: 0.7;
      margin-top: 5px;
    }

    .icons {
      margin-top: 20px;
    }

    .icons a {
      margin: 0 10px;
      color: white;
      font-size: 1.5rem;
      transition: 0.3s;
    }

    .icons a:hover {
      color: #8A2BE2FF;
      text-shadow: 0 0 10px #8A2BE2FF;
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<!-- Tela Inicial -->
<div class="content" id="home">
  <h1>SAIPHER</h1>

  <!-- Nome clicável abre o repositório -->
  <a class="name-link" href="https://saipher-lab.github.io/jenifferpott">
    Jeniffer Pott
  </a>

  <p class="subtitle">cybersecurity</p>

  <div class="icons">
    <a href="https://github.com/saipher-lab" target="_blank"><i class="fab fa-github"></i></a>
    <a href="https://www.linkedin.com/in/jenifferpott/" target="_blank"><i class="fab fa-linkedin"></i></a>
    <a href="#" target="_blank"><i class="fas fa-file-alt"></i></a>
    <a href="#" target="_blank"><i class="fas fa-paper-plane"></i></a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true }
  }
});
</script>

</body>
</html>
