<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saipher</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content {
      text-align: center;
      z-index: 1;
    }

    h1 {
      font-size: 3rem;
      text-shadow: 0 0 20px #00f0ff;
    }

    p {
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .icons a {
      margin: 0 10px;
      color: white;
      font-size: 1.5rem;
      transition: 0.3s;
    }

    .icons a:hover {
      color: #00f0ff;
      text-shadow: 0 0 10px #00f0ff;
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="content">
  <h1>Saipher</h1>
  <p>Jeniffer Pott — Cybersecurity Student</p>

  <div class="icons">
    <a href="#"><i class="fab fa-github"></i></a>
    <a href="#"><i class="fab fa-linkedin"></i></a>
    <a href="#"><i class="fas fa-file-alt"></i></a>
    <a href="#"><i class="fas fa-paper-plane"></i></a>
  </div>
</div>

<!-- Partículas -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true }
  }
});
</script>

</body>
</html>
