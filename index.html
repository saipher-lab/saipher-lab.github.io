<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SAIPHER</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">
  
  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .content, .repo {
      text-align: center;
      z-index: 1;
    }

    h1 {
      font-size: 3rem;
      text-shadow: 0 0 20px #8A2BE2FF; /* ROXO */
    }

    .name-link {
      display: block;
      margin-top: 10px;
      font-size: 1.2rem;
      color: white;
      text-decoration: none;
      transition: 0.3s;
      cursor: pointer;
    }

    .name-link:hover {
      color: #8A2BE2FF; /* ROXO */
      text-shadow: 0 0 10px #8A2BE2FF; /* ROXO */
    }

    .subtitle {
      opacity: 0.7;
      margin-top: 5px;
    }

    .icons {
      margin-top: 20px;
    }

    .icons a {
      margin: 0 10px;
      color: white;
      font-size: 1.5rem;
      transition: 0.3s;
    }

    .icons a:hover {
      color: #8A2BE2FF; /* ROXO */
      text-shadow: 0 0 10px #8A2BE2FF; /* ROXO */
    }

    /* Botão voltar */
    .back-btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #8A2BE2FF; /* ROXO */
      color: white;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #8b00c5;
    }

    /* Escondendo a tela de repo por padrão */
    .repo {
      display: none;
    }

  </style>
</head>

<body>

<div id="particles-js"></div>

<!-- Tela Inicial -->
<div class="content" id="home">
  <h1>SAIPHER</h1>

  <!-- Nome clicável abre na mesma página -->
  <span class="name-link" id="openRepo">Jeniffer Pott</span>

  <p class="subtitle">cybersecurity</p>

  <div class="icons">
    <a href="https://github.com/saipher-lab" target="_blank"><i class="fab fa-github"></i></a>
    <a href="https://www.linkedin.com/in/jenifferpott/" target="_blank"><i class="fab fa-linkedin"></i></a>
    <a href="#" target="_blank"><i class="fas fa-file-alt"></i></a>
    <a href="#" target="_blank"><i class="fas fa-paper-plane"></i></a>
  </div>
</div>

<!-- Tela do Repositório -->
<div class="repo" id="repoPage">
  <h1>Repositório: Jeniffer Pott</h1>
  <p>Aqui você pode colocar informações do seu repositório ou links para os projetos.</p>
  <button class="back-btn" id="backHome">Voltar para a tela inicial</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true }
  }
});

// Abrir tela do repositório
document.getElementById('openRepo').addEventListener('click', function() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('repoPage').style.display = 'block';
});

// Voltar para tela inicial
document.getElementById('backHome').addEventListener('click', function() {
  document.getElementById('repoPage').style.display = 'none';
  document.getElementById('home').style.display = 'block';
});
</script>

</body>
</html>
